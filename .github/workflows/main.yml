name: vprofile actions

on:
  workflow_dispatch:

  push:
    branches:
      - main
      - stage

  pull_request:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: vprofileapp
  EKS_CLUSTER: vproapp-gitops-eks

jobs:

  testing:
    runs-on: ubuntu-latest

    steps:
      # Checkout Source Code
      - name: Code Checkout
        uses: actions/checkout@v4

      # Setup Java 11
      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: maven

      # Verify Java & Maven
      - name: Verify Java and Maven
        run: |
          java -version
          mvn -version

      # Maven Test
      - name: Maven Test
        run: mvn test

      # Checkstyle
      - name: Checkstyle
        run: mvn checkstyle:checkstyle

      # Setup SonarQube Scanner
      - name: Setup SonarQube Scanner
        uses: warchant/setup-sonar-scanner@v7

      # SonarQube Scan
      - name: SonarQube Scan
        run: |
          sonar-scanner \
          -Dsonar.host.url=${{ secrets.SONAR_URL }} \
          -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
          -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }} \
          -Dsonar.sources=src/ \
          -Dsonar.junit.reportsPath=target/surefire-reports/ \
          -Dsonar.jacoco.reportsPath=target/jacoco.exec \
          -Dsonar.java.checkstyle.reportPaths=target/checkstyle-result.xml
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_URL }}

      # Package Application
      - name: Package Application
        run: mvn clean package -DskipTests

  build_and_publish:
    needs: testing
    runs-on: ubuntu-latest

    steps:
      # Checkout Source Code
      - name: Code Checkout
        uses: actions/checkout@v4

      # Setup Java 11
      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: maven

      # Configure AWS Credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Login to Amazon ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -t $ECR_REPOSITORY:${{ github.run_number }} .

          docker tag $ECR_REPOSITORY:${{ github.run_number }} \
          ${{ secrets.REGISTRY }}/$ECR_REPOSITORY:${{ github.run_number }}

          docker tag $ECR_REPOSITORY:${{ github.run_number }} \
          ${{ secrets.REGISTRY }}/$ECR_REPOSITORY:latest

      # Push Docker Image
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.REGISTRY }}/$ECR_REPOSITORY:${{ github.run_number }}

          docker push ${{ secrets.REGISTRY }}/$ECR_REPOSITORY:latest
